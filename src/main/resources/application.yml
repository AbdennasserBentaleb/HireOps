spring:
  application:
    name: hireops-engine
    
  docker:
    compose:
      enabled: true
      file: docker-compose.yml
      
  datasource:
    url: jdbc:postgresql://localhost:5432/hireops_db
    username: hireops_user
    password: hireops_password
    
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: llama3
          temperature: 0.7
      embedding:
        options:
          model: nomic-embed-text
          
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 768
        initialize-schema: true

  mail:
    host: ${MAIL_HOST:smtp.example.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  batch:
    jdbc:
      initialize-schema: always

server:
  port: 8081

app:
  settings:
    pdf-storage-path: ${PDF_STORAGE_PATH:/app/data/pdfs}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    tags:
      application: hireops-engine

resilience4j:
  circuitbreaker:
    instances:
      ollamaCB:
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
  retry:
    instances:
      ollamaRetry:
        maxAttempts: 3
        waitDuration: 2s
      bundesagenturRetry:
        maxAttempts: 3
        waitDuration: 1s
