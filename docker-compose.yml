version: '3.8'
services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: hireops-postgres-vector
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hireops_db}
      POSTGRES_USER: ${POSTGRES_USER:-hireops_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hireops_secure_pass}
    ports:
      - "5433:5432"
    volumes:
      - hireops_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hireops_user} -d ${POSTGRES_DB:-hireops_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: hireops-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped


  app:
    build: .
    container_name: hireops-engine-app
    depends_on:
      - pgvector
      - ollama
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hireops_db}
      POSTGRES_USER: ${POSTGRES_USER:-hireops_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hireops_secure_pass}
      # Instruct the app to connect to the pgvector container via container name
      SPRING_DATASOURCE_URL: jdbc:postgresql://hireops-postgres-vector:5432/${POSTGRES_DB:-hireops_db}
      # Instruct the app to connect to the bundled Ollama container
      SPRING_AI_OLLAMA_BASE_URL: http://hireops-ollama:11434
      # Persistent PDF storage path for CVs and cover letters
      PDF_STORAGE_PATH: /app/data/pdfs
    ports:
      - "8081:8081"
    volumes:
      - hireops_pdf_data:/app/data/pdfs
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  hireops_pg_data:
  ollama_data:
  hireops_pdf_data:
